<!DOCTYPE html>
<html lang="zh-TW" style="--text-color: #f1eaea;"><head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberData Dashboard V11.8 - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-color: #05070a;
            --panel-bg: rgba(10, 15, 25, 0.95);
            --main-cyan: #00f2fe;
            --main-pink: #ff00de;
            --font-family: 'Orbitron', 'Microsoft JhengHei', sans-serif;
            --text-color: #ffffff;
            --marquee-color: #00f2fe;
            --marquee-speed: 30s;
        }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background-color: #243a5b; color: var(--text-color); font-family: var(--font-family); margin: 0; padding: 10px; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; border: 2px solid var(--main-cyan); background: rgba(0, 0, 0, 0.85); box-shadow: 0 0 20px var(--main-cyan); min-height: 60px; }
        .project-controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        #view-project-tags { display: flex; gap: 10px; flex-wrap: wrap; }
        .project-tag { background: rgba(0, 242, 254, 0.2); border: 1px solid var(--main-cyan); color: var(--main-cyan); padding: 5px 15px; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px var(--main-cyan); border-radius: 4px; cursor: grab; transition: transform 0.2s; white-space: nowrap; }
        
        .style-nav { display: none; grid-template-columns: 1fr; padding: 10px 25px; background: rgba(0, 242, 254, 0.1); border: 1px solid var(--main-cyan); }
        .style-container { display: flex; justify-content: flex-end; gap: 20px; align-items: center; flex-wrap: wrap; }
        .style-input-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--main-cyan); font-weight: bold; }
        .style-input-group input { background: transparent; color: var(--main-cyan); border: 1px solid var(--main-cyan); }
        
        .main-layout { display: flex; gap: 15px; flex-grow: 1; overflow: hidden; position: relative; }
        
        .charts-container { 
            display: grid; align-content: start; gap: 15px; flex-grow: 1; overflow-y: auto; 
            padding-right: 5px; scrollbar-width: thin; scrollbar-color: var(--main-cyan) #000; 
            padding-bottom: 30px; 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
        }
        
        .project-column { display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        
        .cyber-panel { 
            background: var(--panel-bg); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 4px; 
            position: relative; padding: 15px; display: flex; flex-direction: column; box-sizing: border-box; 
            min-height: 0; flex: 1; 
        } 
        
        .chart-render-box { width: 100%; flex-grow: 1; min-height: 250px; }

        /* 保留單圖修復：強制撐滿高度 */
        .layout-1 { grid-template-columns: 1fr; }
        .layout-1 .project-column { height: auto; scroll-snap-align: none; }
        .layout-1 .cyber-panel { 
            flex: none !important; 
            height: calc(100vh - 120px) !important; 
            min-height: 400px;
            scroll-snap-align: start; scroll-snap-stop: always; 
        }

        .layout-2 { grid-template-columns: 1fr; }
        .layout-4 { grid-template-columns: repeat(2, 1fr); }
        .layout-6 { grid-template-columns: repeat(3, 1fr); }

        .layout-2 .project-column, .layout-4 .project-column, .layout-6 .project-column {
            height: calc(100vh - 125px); scroll-snap-align: start; scroll-snap-stop: always;
        }
        
        .panel-header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(0, 242, 254, 0.3); margin-bottom: 8px; padding-bottom: 5px; flex-shrink: 0; }
        .panel-header-text { color: var(--main-cyan); font-size: 18px; font-weight: bold; text-shadow: 0 0 10px var(--main-cyan); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-marquee { flex: 1; margin-left: 15px; background: rgba(0, 242, 254, 0.05); height: 35px; border-radius: 4px; border: 1px solid rgba(0, 242, 254, 0.1); overflow: hidden; position: relative; }
        .marquee-inner { position: absolute; white-space: nowrap; animation: marquee var(--marquee-speed) linear infinite; color: var(--marquee-color); font-size: 18px; line-height: 35px; font-weight: bold; text-shadow: 0 0 8px var(--marquee-color); }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* ======== 最終關鍵修復：強制鎖死數據中心寬度，絕對不准縮水擠壓 ======== */
        .data-center { 
            display: flex; flex-direction: column; height: 100%; transition: all 0.3s ease; position: relative; 
            width: 550px; 
            flex: 0 0 550px !important; /* 蓋掉 .cyber-panel 的 flex: 1，防止被壓扁 */
        }
        .data-center.collapsed { 
            width: 40px !important; 
            flex: 0 0 40px !important; 
        }
        .data-center.collapsed .scroll-area, .data-center.collapsed .panel-header-text { display: none; }
        .collapse-btn { position: absolute; left: -25px; top: 50%; transform: translateY(-50%); background: var(--panel-bg); border: 1px solid var(--main-cyan); color: var(--main-cyan); cursor: pointer; width: 25px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 12px; writing-mode: vertical-lr; z-index: 100; border-radius: 4px 0 0 4px; }

        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 10px; scrollbar-width: thin; scrollbar-color: var(--main-cyan) #000; height: calc(100vh - 160px); }
        .proj-section-title { background: linear-gradient(90deg, rgba(0, 242, 254, 0.3), transparent); color: var(--main-cyan); padding: 8px 15px; font-weight: bold; font-size: 18px; margin: 15px 0 10px 0; border-left: 5px solid var(--main-cyan); }
        .data-row { background: rgba(255,255,255,0.02); margin-bottom: 20px; border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 8px; overflow: hidden; width: 100%; }
        .row-header-title { background: rgba(0, 242, 254, 0.15); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-cyan); }
        .date-input-fixed { font-size: 18px; font-weight: bold; color: var(--main-cyan); background: transparent; border: 1px solid rgba(0, 242, 254, 0.5); padding: 5px; color-scheme: dark; width: 160px; box-sizing: border-box; }
        
        /* 還原乾淨的三欄網格 */
        .data-content-grid-fixed { 
            padding: 15px; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            width: 100%; 
            box-sizing: border-box; 
        }
        
        /* 輸入框佈局優化：靠右對齊，確保數字清晰可見 */
        .input-group-stable { 
            display: flex; align-items: center; width: 100%; background: rgba(0,0,0,0.6); 
            border: 1px solid #444; border-radius: 4px; height: 36px; box-sizing: border-box; 
        }
        .num-input-stable { 
            flex: 1 1 auto; width: 100%; min-width: 0; 
            text-align: right; padding-right: 5px; /* 改為靠右對齊，貼合單位 */
            font-size: 16px; font-weight: bold;
            color: #ffffff !important; -webkit-text-fill-color: #ffffff !important;
            background: transparent; border: none; outline: none; box-sizing: border-box; 
        }
        .unit-input-stable { 
            flex: 0 0 35px; width: 35px; height: 100%; text-align: center; 
            font-size: 12px; color: #00f2fe !important; -webkit-text-fill-color: #00f2fe !important;
            background: rgba(255,255,255,0.1); border: none; padding: 0; outline: none; box-sizing: border-box; 
        }

        /* 系統觀看模式文字顏色強制覆蓋 */
        input:disabled { opacity: 1 !important; -webkit-text-fill-color: currentColor !important; color: inherit !important; }
        .num-input-stable:disabled { -webkit-text-fill-color: #ffffff !important; color: #ffffff !important; }
        .unit-input-stable:disabled { -webkit-text-fill-color: #00f2fe !important; color: #00f2fe !important; }
        .date-input-fixed:disabled, .data-content-grid-fixed > div > input:disabled { -webkit-text-fill-color: var(--main-cyan) !important; color: var(--main-cyan) !important; }
        
        .top-btn { background: transparent; border: 2px solid var(--main-cyan); color: var(--main-cyan); padding: 6px 14px; cursor: pointer; font-family: var(--font-family); font-size: 16px; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; }
        
        #file-viewer-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #file-viewer-close { position: absolute; top: 15px; right: 25px; background: var(--main-pink); border: none; color: white; padding: 8px 20px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; box-shadow: 0 0 10px var(--main-pink); z-index: 10001; }
        #file-viewer-content { width: 95%; height: 90%; max-width: 1400px; display: flex; justify-content: center; align-items: center; border: 2px solid var(--main-cyan); border-radius: 8px; background: #000; }

        .edit-only { display: none; }
        .edit-mode .edit-only { display: flex; }
        .view-mode .view-only { display: flex; }
        .edit-mode .view-only { display: none; }

        /* 行動裝置/窄螢幕安全防護 */
        @media screen and (max-width: 1024px) {
            body { height: auto; overflow-x: hidden; overflow-y: auto; }
            .main-layout { flex-direction: column; height: auto; overflow: visible; }
            .data-center { width: 100% !important; flex: none !important; height: auto !important; margin-top: 10px; }
            .scroll-area { height: auto !important; max-height: none; }
            .top-nav { flex-direction: column; align-items: center; gap: 15px; }
            .top-nav > div { justify-content: center; }
            .collapse-btn { display: none; }
            .row-header-title { flex-wrap: wrap; gap: 10px; }
        }
    </style>
</head>

            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: flex-end;">

                    <button class="top-btn" id="btn-layout-2" onclick="switchLayout('2')" style="border-color:var(--main-pink); color:var(--main-pink);">雙圖</button>

        <div id="style-bar" class="style-nav">

                <div class="style-input-group"><span>背景</span><input type="color" id="c-bg" value="#243a5b" oninput="saveStyles()"></div>

                <div class="style-input-group"><span>軸大小</span><input type="number" id="n-axis-size" value="14" min="8" max="40" style="width:50px;" oninput="saveStyles()"></div>
                <div class="style-input-group"><span>V0</span><input type="color" id="c-v0" value="#00f2fe" oninput="initCharts()"></div>
                <div class="style-input-group"><span>V1</span><input type="color" id="c-v1" value="#f39c12" oninput="initCharts()"></div>
                <div class="style-input-group"><span>V2</span><input type="color" id="c-v2" value="#ff00de" oninput="initCharts()"></div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="charts-container layout-2" id="charts-wrapper"></div>
        <div class="cyber-panel data-center" id="data-center-panel">
            <button class="collapse-btn" onclick="toggleDataCenter()">◀ 收折數據中心</button>
            <div class="panel-header-text" style="display:flex; align-items:center; gap: 15px; margin-bottom:10px;">
                數據中心 
                <button class="top-btn edit-only" style="font-size:14px; padding: 4px 12px;" onclick="addRow()">+ 新增月份</button>
            </div>
            <div class="scroll-area" id="data-container"></div>
        </div>
    </div>

    <script>
        const GOOGLE_PROXY_URL = "https://script.google.com/macros/s/AKfycbzuhb-mE4OBbbunf6VjbasaVyqnbDlv1BMrqHQHA57xEyq_7GvJc5JHQgsg-KiX0N_r/exec";
        let isEditable = false;
        let chartInstances = [];
        let projectStore = PRESET_DATA.projectStore;
        let selectedProjects = PRESET_DATA.selectedProjects;
        window.livePrices = { "p2": "Google 通道建立中...", "p1774340815917": "Google 通道建立中..." };

        window.onload = () => {
            loadFromStorage(); applyVisuals(); updateSelector(); 
            setTimeout(() => {
                initCharts();
                renderList();
                updateViewTags();
            }, 150);
            startPriceUpdates(); startClock();
        };

        function startClock() {
            const el = document.getElementById('live-clock');
            const update = () => {
                const now = new Date();
                el.innerText = `${now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'long' })} ${now.toLocaleTimeString('zh-TW', { hour12:false })}`;
            };
            update(); setInterval(update, 1000);
        }

        function formatThousand(num) {
            if (num === null || num === undefined || num === '') return '';
            let parts = num.toString().split(".");
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return parts.join(".");
        }

        function switchLayout(mode) {
            const wrapper = document.getElementById('charts-wrapper');
            wrapper.className = `charts-container layout-${mode}`;
            ['1', '2', '4', '6'].forEach(m => {
                const btn = document.getElementById(`btn-layout-${m}`);
                btn.style.borderColor = 'var(--main-cyan)'; btn.style.color = 'var(--main-cyan)';
            });
            document.getElementById(`btn-layout-${mode}`).style.borderColor = 'var(--main-pink)';
            document.getElementById(`btn-layout-${mode}`).style.color = 'var(--main-pink)';
            
            setTimeout(() => {
                chartInstances.forEach(inst => { inst.bc.resize(); inst.lc.resize(); });
            }, 100);
        }

        function initCharts() {
            const wrapper = document.getElementById('charts-wrapper');
            wrapper.innerHTML = ''; 
            chartInstances.forEach(ins => { if(ins.bc) ins.bc.dispose(); if(ins.lc) ins.lc.dispose(); });
            chartInstances = [];
            
            const lCol = document.getElementById('c-label').value;
            const lSize = parseInt(document.getElementById('n-label-size').value) || 16;
            const aCol = document.getElementById('c-axis').value;
            const aSize = parseInt(document.getElementById('n-axis-size').value) || 14;
            const colors = [document.getElementById('c-v0').value, document.getElementById('c-v1').value, document.getElementById('c-v2').value];

            selectedProjects.forEach((pid) => {
                const proj = projectStore[pid];
                const data = [...proj.data].sort((a,b) => new Date(a.date) - new Date(b.date));
                const xData = data.map(d => d.date.replace(/-/g,'/'));
                const unit = data[0]?.u0 || "";
                
                const col = document.createElement('div'); col.className = 'project-column'; wrapper.appendChild(col);

                const createPanel = (type, title) => {
                    const p = document.createElement('div'); p.className = 'cyber-panel';
                    let mq = (pid==="p2"||pid==="p1774340815917") ? `<div class="header-marquee"><div class="marquee-inner" id="mq-${pid}">${window.livePrices[pid]}</div></div>` : "";
                    const chartId = `${type}-${pid}`;
                    p.innerHTML = `<div class="panel-header-container"><span class="panel-header-text">${title} - ${proj.name}</span>${mq}</div><div id="${chartId}" class="chart-render-box"></div>`;
                    col.appendChild(p);
                    return echarts.init(document.getElementById(chartId), 'dark');
                };

                const bc = createPanel('bar', '圓柱比對');
                const lc = createPanel('line', '趨勢分析');

                const common = { 
                    backgroundColor: 'transparent', 
                    grid: { top: 55, bottom: 90, left: '5%', right: '5%', containLabel: true },
                    legend: { show: true, top: 0, textStyle: { color: aCol, fontSize: aSize } },
                    tooltip: { trigger: 'axis' },
                    dataZoom: [
                        { type: 'slider', show: true, xAxisIndex: [0], bottom: 10, height: 20, borderColor: 'rgba(0, 242, 254, 0.4)', fillerColor: 'rgba(0, 242, 254, 0.2)', handleStyle: { color: '#00f2fe' }, textStyle: { color: aCol } },
                        { type: 'inside', xAxisIndex: [0] }
                    ]
                };
                const xAxisOpt = { data: xData, axisLabel: { color: aCol, fontSize: aSize, rotate: 30, interval: 0 } };

                bc.setOption({ ...common, xAxis: xAxisOpt, yAxis: { name:unit, scale:true, boundaryGap: ['0%', '20%'], axisLabel:{color:aCol, fontSize:aSize} },
                    series: proj.labels.map((name, i) => ({
                        name: name||`V${i}`, type: 'bar', data: data.map(d => parseFloat(d['v'+i])||0),
                        label: { show: true, position: 'top', color: lCol, fontSize: lSize, fontWeight:'bold', formatter: (p) => formatThousand(p.value) },
                        itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0, color:colors[i]},{offset:1, color:'transparent'}]), shadowBlur: 10, shadowColor: colors[i] }, barWidth: '25%'
                    }))
                });

                lc.setOption({ ...common, xAxis: xAxisOpt, yAxis: { name:unit, scale:true, boundaryGap: ['0%', '20%'], axisLabel:{color:aCol, fontSize:aSize} },
                    series: proj.labels.map((name, i) => ({
                        name: name||`V${i}`, type: 'line', smooth: true, symbolSize: 10, data: data.map(d => parseFloat(d['v'+i])||0),
                        lineStyle: { width: 4, color: colors[i], shadowBlur: 10, shadowColor: colors[i] },
                        label: { show: true, position: 'top', color: lCol, fontSize: lSize, fontWeight:'bold', formatter: (p) => formatThousand(p.value) },
                        emphasis: { focus: 'series', label: { show: true, fontSize: lSize + 2 } }
                    }))
                });
                
                const handleDoubleClick = function(params) {
                    const rowData = data[params.dataIndex];
                    if(rowData && rowData.fileData) { showFileViewer(rowData.fileData, rowData.fileType); }
                };
                bc.on('dblclick', handleDoubleClick);
                lc.on('dblclick', handleDoubleClick);

                chartInstances.push({bc, lc, pid});
            });

            setTimeout(() => { chartInstances.forEach(inst => { inst.bc.resize(); inst.lc.resize(); }); }, 50);
        }

        function handleFileUpload(pid, idx, input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { const base64 = e.target.result; projectStore[pid].data[idx].fileData = base64; projectStore[pid].data[idx].fileType = file.type; try { saveToStorage(); initCharts(); renderList(); } catch(err) { alert("⚠️ 存檔失敗！檔案太大。"); projectStore[pid].data[idx].fileData = null; projectStore[pid].data[idx].fileType = null; input.value = ''; } }; reader.readAsDataURL(file); }
        function removeFile(pid, idx) { if(confirm('確定要刪除此附件檔案嗎？')) { projectStore[pid].data[idx].fileData = null; projectStore[pid].data[idx].fileType = null; saveToStorage(); initCharts(); renderList(); } }
        function showFileViewer(base64Data, type) { const content = document.getElementById('file-viewer-content'); content.innerHTML = ''; if (type === 'application/pdf') { content.innerHTML = `<iframe src="${base64Data}" style="width:100%; height:100%; border:none;"></iframe>`; } else if (type.startsWith('image/')) { content.innerHTML = `<img src="${base64Data}" style="max-width:100%; max-height:100%; object-fit:contain;">`; } document.getElementById('file-viewer-overlay').style.display = 'flex'; }
        function closeFileViewer() { document.getElementById('file-viewer-overlay').style.display = 'none'; document.getElementById('file-viewer-content').innerHTML = ''; }
        function renderList() { const container = document.getElementById('data-container'); container.innerHTML = ''; selectedProjects.forEach(pid => { const proj = projectStore[pid]; const section = document.createElement('div'); section.innerHTML = `<div class="proj-section-title"><span>專案：</span><span class="editable-proj-name" contenteditable="${isEditable}" oninput="projectStore['${pid}'].name=this.innerText">${proj.name}</span></div><div class="rows-box" data-pid="${pid}"></div>`; const rowsBox = section.querySelector('.rows-box'); proj.data.forEach((d, i) => { const row = document.createElement('div'); row.className = 'data-row'; row.draggable = isEditable; row.dataset.idx = i; const actionButtons = isEditable ? `<div style="display:flex; gap:10px; align-items:center;"><label style="cursor:pointer; color:${d.fileData ? '#4caf50' : 'var(--main-cyan)'}; border:1px solid; padding:2px 6px; border-radius:3px;">${d.fileData ? '更換附件' : '+ 加入附件'}<input type="file" style="display:none;" accept=".pdf, image/*" onchange="handleFileUpload('${pid}', ${i}, this)"></label>${d.fileData ? `<span onclick="removeFile('${pid}', ${i})" style="color:#ff9800; cursor:pointer;">[刪附件]</span>` : ''}<span onclick="projectStore['${pid}'].data.splice(${i},1); initCharts(); renderList(); saveToStorage();" style="color:var(--main-pink); cursor:pointer;">[移除月份]</span></div>` : (d.fileData ? `<span style="color:#4caf50; font-size:14px; cursor:pointer;" onclick="showFileViewer('${d.fileData}', '${d.fileType}')">📎 查看附件</span>` : ''); row.innerHTML = `<div class="row-header-title"><input type="date" class="date-input-fixed" value="${d.date}" ${!isEditable?'disabled':''} onchange="projectStore['${pid}'].data[${i}].date=this.value; initCharts(); saveToStorage();">${actionButtons}</div><div class="data-content-grid-fixed">${[0,1,2].map(j => `<div style="text-align:center; min-width:0;"><input style="color:var(--main-cyan); font-weight:bold; background:transparent; border:none; text-align:center; width:100%; box-sizing:border-box;" value="${proj.labels[j]}" ${!isEditable?'disabled':''} oninput="projectStore['${pid}'].labels[${j}]=this.value; initCharts(); saveToStorage();"><div class="input-group-stable"><input type="text" class="num-input-stable" value="${formatThousand(d['v'+j])}" ${!isEditable?'disabled':''} onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=formatThousand(this.value)" oninput="projectStore['${pid}'].data[${i}]['v'+${j}]=this.value.replace(/,/g,''); initCharts(); saveToStorage();"><input type="text" class="unit-input-stable" value="${d['u'+j]}" ${!isEditable?'disabled':''} oninput="projectStore['${pid}'].data[${i}]['u'+${j}]=this.value; initCharts(); saveToStorage();"></div></div>`).join('')}</div>`; if(isEditable) { row.ondragstart = (e) => { e.dataTransfer.setData('idx', i); row.classList.add('dragging'); }; row.ondragend = () => row.classList.remove('dragging'); row.ondragover = (e) => { e.preventDefault(); const dragging = document.querySelector('.dragging'); if(dragging) rowsBox.insertBefore(dragging, row.nextSibling === dragging ? row : row); }; } rowsBox.appendChild(row); }); rowsBox.ondrop = (e) => { const pid = rowsBox.dataset.pid; const newRows = Array.from(rowsBox.querySelectorAll('.data-row')); projectStore[pid].data = newRows.map(r => projectStore[pid].data[r.dataset.idx]); initCharts(); renderList(); saveToStorage(); }; container.appendChild(section); }); }
        function updateViewTags() { const box = document.getElementById('view-project-tags'); box.innerHTML = ''; selectedProjects.forEach((pid, index) => { const tag = document.createElement('div'); tag.className = 'project-tag'; tag.innerText = projectStore[pid].name; tag.draggable = true; tag.ondragstart = (e) => { e.dataTransfer.setData('t-idx', index); tag.style.opacity = '0.5'; }; tag.ondrop = (e) => { const fromIdx = e.dataTransfer.getData('t-idx'); const moved = selectedProjects.splice(fromIdx, 1)[0]; selectedProjects.splice(index, 0, moved); initCharts(); updateViewTags(); renderList(); saveToStorage(); }; tag.ondragover = (e) => e.preventDefault(); box.appendChild(tag); }); }
        function addNewProject() { const id = 'p' + Date.now(); projectStore[id] = { name: "新大項", labels: ["標籤1", "", ""], data: [{date: new Date().toISOString().split('T')[0], v0:0, v1:0, v2:0, u0:"", u1:"", u2:""}] }; selectedProjects.push(id); updateSelector(); initCharts(); renderList(); updateViewTags(); saveToStorage(); }
        function deleteCurrentProject() { const s = document.getElementById('project-selector'); const ids = Array.from(s.selectedOptions).map(o => o.value); if(ids.length > 0 && confirm("確定刪除？")) { ids.forEach(id => delete projectStore[id]); selectedProjects = selectedProjects.filter(id => !ids.includes(id)); updateSelector(); initCharts(); renderList(); updateViewTags(); saveToStorage(); } }
        function addRow() { selectedProjects.forEach(pid => { projectStore[pid].data.push({ date: new Date().toISOString().split('T')[0], v0:0, v1:0, v2:0, u0:"", u1:"", u2:"" }); }); initCharts(); renderList(); saveToStorage(); }
        function verifyAccess() { if (document.getElementById('pass-input').value === '1234567890') { isEditable = true; document.body.className = 'edit-mode'; document.getElementById('lock-btn').style.display='none'; document.getElementById('save-btn').style.display='inline-block'; document.getElementById('style-bar').style.display='grid'; hideLogin(); renderList(); } }
        function lockSystem() { isEditable = false; document.body.className = 'view-mode'; document.getElementById('lock-btn').style.display='inline-block'; document.getElementById('save-btn').style.display='none'; document.getElementById('style-bar').style.display='none'; saveToStorage(); initCharts(); renderList(); updateViewTags(); }
        function showLogin() { document.getElementById('login-overlay').style.display='flex'; }
        function hideLogin() { document.getElementById('login-overlay').style.display='none'; }
        function applyVisuals() { document.body.style.backgroundColor = document.getElementById('c-bg').value; }
        function saveStyles() { applyVisuals(); saveToStorage(); initCharts(); }
        function saveToStorage() { localStorage.setItem("CyberDashboard_V115", JSON.stringify({ projectStore, selectedProjects })); }
        function loadFromStorage() { const s = localStorage.getItem("CyberDashboard_V115"); if(s) { const c = JSON.parse(s); projectStore=c.projectStore; selectedProjects=c.selectedProjects; } }
        function updateSelector() { const s = document.getElementById('project-selector'); s.innerHTML = ''; for (let id in projectStore) { const o = document.createElement('option'); o.value = id; o.text = projectStore[id].name; if(selectedProjects.includes(id)) o.selected = true; s.add(o); } }
        function switchProject() { selectedProjects = Array.from(document.getElementById('project-selector').selectedOptions).map(o => o.value); initCharts(); renderList(); updateViewTags(); saveToStorage(); }
        function toggleDataCenter() { const p = document.getElementById('data-center-panel'); p.classList.toggle('collapsed'); p.querySelector('.collapse-btn').innerText = p.classList.contains('collapsed') ? '▶ 展開' : '◀ 收折'; setTimeout(() => { chartInstances.forEach(inst => { if (inst.bc) inst.bc.resize(); if (inst.lc) inst.lc.resize(); }); }, 350); }
        function updateMarketPrice() { const script = document.createElement('script'); script.src = GOOGLE_PROXY_URL; script.onload = () => { const parse = (pid, name, val) => { if(!val) return; const p = val.split(','); const s = `【${name}】 現價: ${parseFloat(p[0]).toFixed(1)} | 昨收: ${parseFloat(p[7]||p[5]).toFixed(1)} (USD/T)`; window.livePrices[pid] = s; if(document.getElementById(`mq-${pid}`)) document.getElementById(`mq-${pid}`).innerText = s; }; if(window.hq_str_hf_CAD) parse('p2', '倫敦銅(LME)', window.hq_str_hf_CAD); if(window.hq_str_hf_AHD) parse('p1774340815917', '倫敦鋁(LME)', window.hq_str_hf_AHD); document.head.removeChild(script); }; document.head.appendChild(script); }
        function startPriceUpdates() { updateMarketPrice(); setInterval(updateMarketPrice, 60000); }
        function exportNewHTML() { const originalClass = document.body.className; const dataStr = `const PRESET_DATA = ${JSON.stringify({ projectStore, selectedProjects })};`; const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML.replace(/const PRESET_DATA = \{.*?\};/, dataStr); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([html], {type:'text/html'})); a.download = `CyberDashboard_V11-8_Fixed.html`; a.click(); }
        window.onresize = () => { chartInstances.forEach(inst => { if (inst.bc) inst.bc.resize(); if (inst.lc) inst.lc.resize(); }); };
    </script>
</body></html>
